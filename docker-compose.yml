# ============================================================================
# NYC Taxi Batch Data Pipeline — Infrastructure as Code
# ============================================================================
# All services run on a private Docker network. Only Airflow UI, MinIO console,
# and Postgres are reachable from the host (bound to 127.0.0.1, not 0.0.0.0).
#
# Bring up:    docker compose up -d
# Tear down:   docker compose down       (keeps volumes)
# Wipe data:   docker compose down -v    (deletes volumes — irreversible)
# View logs:   docker compose logs -f <service-name>
# ============================================================================

x-airflow-common: &airflow-common
  # Shared config for all Airflow services. The "x-" prefix and "&" anchor
  # let us reuse this block across webserver, scheduler, and init.
  image: apache/airflow:2.10.3-python3.12
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # Pip packages installed at container start (development convenience)
    _PIP_ADDITIONAL_REQUIREMENTS: 'apache-airflow-providers-apache-spark==4.11.1 boto3==1.35.49 minio==7.2.10'
    # MinIO connection (used by DAGs/operators)
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark/jobs:/opt/spark/jobs
  user: "${AIRFLOW_UID}:0"
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # --------------------------------------------------------------------------
  # PostgreSQL: serves both as Airflow's metadata DB and the Gold layer
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dep-net

  # --------------------------------------------------------------------------
  # MinIO: S3-compatible object storage for Bronze + Silver layers
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: dep-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dep-net

  # --------------------------------------------------------------------------
  # MinIO bootstrap: creates required buckets on first run, then exits
  # --------------------------------------------------------------------------
  minio-bootstrap:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    container_name: dep-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      echo 'MinIO buckets ready: bronze, silver';
      "
    networks:
      - dep-net

  # --------------------------------------------------------------------------
  # Spark master: coordinates Spark workers and submits jobs
  # --------------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5.3
    container_name: dep-spark-master
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: 'no'
      SPARK_RPC_ENCRYPTION_ENABLED: 'no'
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: 'no'
      SPARK_SSL_ENABLED: 'no'
      SPARK_USER: spark
    ports:
      - "127.0.0.1:7077:7077"   # Cluster manager
      - "127.0.0.1:8081:8080"   # Web UI (host port 8081 to avoid Airflow conflict)
    volumes:
      - ./spark/jobs:/opt/spark/jobs
    networks:
      - dep-net

  # --------------------------------------------------------------------------
  # Spark workers (2 replicas) — actually execute the PySpark jobs
  # --------------------------------------------------------------------------
  spark-worker-1:
    image: bitnami/spark:3.5.3
    container_name: dep-spark-worker-1
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1500M
      SPARK_WORKER_CORES: 1
      SPARK_USER: spark
    volumes:
      - ./spark/jobs:/opt/spark/jobs
    networks:
      - dep-net

  spark-worker-2:
    image: bitnami/spark:3.5.3
    container_name: dep-spark-worker-2
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1500M
      SPARK_WORKER_CORES: 1
      SPARK_USER: spark
    volumes:
      - ./spark/jobs:/opt/spark/jobs
    networks:
      - dep-net

  # --------------------------------------------------------------------------
  # Airflow init: runs once to create DB schema and admin user
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: dep-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "Airflow init complete"
    environment:
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    restart: "no"
    networks:
      - dep-net

  # --------------------------------------------------------------------------
  # Airflow webserver: the UI on http://localhost:8080
  # --------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: dep-airflow-webserver
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dep-net

  # --------------------------------------------------------------------------
  # Airflow scheduler: triggers DAG runs on schedule, dispatches tasks
  # --------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: dep-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dep-net

# ============================================================================
# Named volumes — survive docker compose down. Use `down -v` to wipe.
# ============================================================================
volumes:
  postgres-data:
  minio-data:

# ============================================================================
# Private bridge network. Containers reach each other by service name
# (e.g., http://minio:9000), nothing leaks to the host network.
# ============================================================================
networks:
  dep-net:
    driver: bridge
